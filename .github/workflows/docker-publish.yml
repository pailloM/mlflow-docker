name: Docker

on:
  release:
    types: [published, edited]
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 3 * * *'   # nightly at 03:00 UTC
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      REPO_NAME: mlflow-docker
      UPSTREAM_REPO: mlflow/mlflow
      REGISTRY: ghcr.io
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute lowercase owner and image name
        id: owner
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER:-${GITHUB_ACTOR}}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${{ env.REGISTRY }}/${OWNER_LOWER}/${{ env.REPO_NAME }}"
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Get latest upstream release tag (schedule only)
        if: github.event_name == 'schedule'
        id: upstream
        run: |
          set -eux
          API="https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest"
          TAG="$(curl -sSfL $API | jq -r .tag_name)"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No upstream release tag found; setting tag=none"
            echo "tag=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if image for upstream tag already exists in registry (schedule only)
        if: github.event_name == 'schedule'
        id: check_image
        run: |
          set -eux
          IMAGE="${{ steps.owner.outputs.image_name }}:${{ steps.upstream.outputs.tag }}"
          echo "Checking for existing image: $IMAGE"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        # If triggered by schedule: build only when upstream image doesn't exist and upstream tag found.
        # If triggered by tag/release/dispatch: always build.
        if: >
          github.event_name != 'schedule' ||
          (github.event_name == 'schedule' && steps.upstream.outputs.tag != 'none' && steps.check_image.outputs.exists == 'false')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.owner.outputs.image_name }}:${{ (github.event_name == 'schedule') && steps.upstream.outputs.tag || github.ref_name || 'latest' }}
            ${{ steps.owner.outputs.image_name }}:latest
          build-args: |
            TAG=${{ (github.event_name == 'schedule') && steps.upstream.outputs.tag || github.ref_name || 'latest' }}

      - name: Image digest
        if: >
          github.event_name != 'schedule' ||
          (github.event_name == 'schedule' && steps.upstream.outputs.tag != 'none' && steps.check_image.outputs.exists == 'false')
        run: |
          TAG="${{ (github.event_name == 'schedule') && steps.upstream.outputs.tag || github.ref_name || 'latest' }}"
          echo "Pushed images:"
          docker manifest inspect ${{ steps.owner.outputs.image_name }}:${TAG} || true
